name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies (CPU-only PyTorch)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports (core modules)
        run: |
          python -c "
          import sys
          print('Python:', sys.version)

          # Core non-heavy first
          from app.db import init_db, save_message, get_history
          print('✓ db')

          from app import create_app
          print('✓ app factory')

          from app.routes import bp
          print('✓ routes')

          # chatbot triggers embeddings + Chroma + torch (expected cost)
          from app.chatbot import chat, get_llm
          print('✓ chatbot (RAG stack)')

          from app.ingest import scrape, build_vectorstore
          print('✓ ingest')

          print('All imports OK')
          "

      - name: Smoke test Flask app
        run: |
          app = create_app()
          client = app.test_client()

          # Health
          resp = client.get("/health")
          assert resp.status_code == 200
          data = resp.get_json()
          assert data["ok"] is True
          print("✓ /health")

          # Chat endpoint basic validation (no real LLM call)
          resp = client.post("/chat", json={"message": "test"})
          # This will likely fail without GROQ_API_KEY + vectorstore,
          # so we only assert it returns a proper error shape
          assert resp.status_code in (200, 400, 500)
          print("✓ /chat endpoint responded")

      - name: Verify requirements are installable
        run: |
          pip install -r requirements.txt --dry-run --quiet
          echo "✓ requirements.txt resolves cleanly"
